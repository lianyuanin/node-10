name: Run Node

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: node-run
  cancel-in-progress: true

permissions:
  actions: write   # required for `gh workflow run` chain re-trigger
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      COORDINATOR_URL: ${{ secrets.COORDINATOR_URL }}
      COORDINATOR_TOKEN: ${{ secrets.COORDINATOR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download runtime
        run: |
          node -e "
            const u = process.env.COORDINATOR_URL;
            const t = process.env.COORDINATOR_TOKEN;
            if (!u || !t) { console.error('[setup] COORDINATOR_URL/TOKEN missing'); process.exit(1); }
            fetch(u+'/v1/runtime', { headers: { Authorization: 'Bearer '+t } })
              .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
              .then(({files}) => {
                const fs=require('fs'), path=require('path');
                const dir = '.reworkflow';
                Object.entries(files).forEach(([p,c]) => {
                  const fp = path.join(dir, p);
                  fs.mkdirSync(path.dirname(fp), { recursive: true });
                  fs.writeFileSync(fp, c);
                });
                console.log('[setup] runtime downloaded ('+Object.keys(files).length+' files)');
              })
              .catch(e => {
                const runner = '.reworkflow/src/runner.js';
                if (require('fs').existsSync(runner)) {
                  console.warn('[setup] coordinator unreachable, using cached runtime');
                } else {
                  console.error('[setup] runtime fetch failed:', e.message);
                  process.exit(1);
                }
              });
          "

      - name: Install runtime dependencies
        run: |
          cd .reworkflow
          npm install --no-audit --no-fund --prefer-offline

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('.reworkflow/package.json') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y xvfb
          npx playwright install chromium --with-deps

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2

      - name: Run node
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          THREADS: ${{ vars.THREADS || '5' }}
          DISPLAY: ":99"
        run: timeout 21300 node .reworkflow/index.js || true

      - name: Re-trigger for next cycle
        if: always()
        env:
          GH_TOKEN: ${{ secrets.WORKER_GITHUB_TOKEN }}
        run: gh workflow run runner.yml --ref main
